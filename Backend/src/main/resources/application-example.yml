server:
  port: 8080

spring:
  application:
    name: knowledge
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

knowledge:
  storage-dir: ./data/uploads
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:deepseek-r1:1.5b}
  paper:
    semantic-scholar-url: https://api.semanticscholar.org/graph/v1
    arxiv-url: https://export.arxiv.org/api/query
