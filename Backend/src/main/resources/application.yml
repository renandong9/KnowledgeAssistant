server:
  port: 8080

spring:
  application:
    name: knowledge
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

knowledge:
  storage-dir: ${KNOWLEDGE_STORAGE_DIR:./data/uploads}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:deepseek-r1:1.5b}
    embedding-model: ${OLLAMA_EMBEDDING_MODEL:}
  ocr:
    enabled: ${OCR_ENABLED:false}
    provider: ${OCR_PROVIDER:tess4j}
    tesseract-data-path: ${TESSDATA_PREFIX:}
    language: ${OCR_LANGUAGE:eng}
    dpi: ${OCR_DPI:200}
    max-pages: ${OCR_MAX_PAGES:20}
  paper:
    semantic-scholar-url: ${SEMANTIC_SCHOLAR_URL:https://api.semanticscholar.org/graph/v1}
    semantic-scholar-api-key: ${SEMANTIC_SCHOLAR_API_KEY:}
    arxiv-url: ${ARXIV_URL:https://export.arxiv.org/api/query}
