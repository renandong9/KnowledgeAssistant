server:
  port: 8080

spring:
  application:
    name: knowledge
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_base?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

knowledge:
  storage-dir: ./data/uploads
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com
    chat-model: deepseek-chat
    embedding-model: deepseek-chat
  paper:
    semantic-scholar-url: https://api.semanticscholar.org/graph/v1
    arxiv-url: https://export.arxiv.org/api/query
